<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>플로우 아카데미 — 10초 자가진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFFFFF;
    --bg-elevated: #FFFFFF;
    --bg-soft: #F5F4FB;
    --bg-mint: #ECF2EA;
    --bg-accent: #FFF1E0;
    --ink: #15132E;
    --ink-soft: #4A4870;
    --ink-mute: #8B89A6;
    --line: #E5E2EF;
    --line-soft: #EFECF6;
    --brand: #5046E5;
    --brand-deep: #3530A8;
    --brand-soft: #EEEDFE;
    --brand-light: #8077ED;
    --accent: #4F7B5E;
    --warn: #C26A3C;
    --gold: #B8893E;
    --serif: 'Newsreader', 'Pretendard Variable', serif;
    --sans: 'Pretendard Variable', -apple-system, sans-serif;
  }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: 'ss03', 'cv11';
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
    line-height: 1.55;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  body {
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(at 5% 0%, rgba(80, 70, 229, 0.04) 0%, transparent 50%),
      radial-gradient(at 95% 100%, rgba(80, 70, 229, 0.025) 0%, transparent 50%);
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 32px 28px 120px; }

  /* === Top Nav === */
  .topnav {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 28px; border-bottom: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .logo img { height: 24px; width: auto; display: block; }
  .logo-sub {
    font-family: var(--serif);
    font-size: 14px; font-weight: 400;
    color: var(--ink-mute); letter-spacing: -0.01em;
    padding-left: 10px; border-left: 1px solid var(--line);
    line-height: 1;
  }
  .nav-meta { font-size: 12px; color: var(--ink-mute); letter-spacing: 0.06em; }

  /* === Step Track (단계 라벨 포함) === */
  .step-track {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    align-items: flex-end;
  }
  .step-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }
  .step-bar {
    width: 100%;
    height: 3px;
    background: var(--line-soft);
    border-radius: 2px;
    transition: background 0.3s ease;
  }
  .step-item.active .step-bar { background: var(--brand); }
  .step-item.done .step-bar { background: var(--accent); }
  .step-label {
    font-size: 10.5px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
    transition: color 0.3s ease;
    white-space: nowrap;
  }
  .step-item.active .step-label { color: var(--brand); font-weight: 600; }
  .step-item.done .step-label { color: var(--ink-soft); font-weight: 500; }
  @media (max-width: 720px) {
    .step-label { font-size: 9.5px; letter-spacing: 0; }
  }

  /* === Answer Chips (응답 누적) === */
  .context-area { margin-bottom: 20px; min-height: 0; }
  .context-label {
    font-size: 10.5px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .answer-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .answer-chip {
    background: var(--brand-soft);
    color: var(--brand-deep);
    font-size: 11.5px;
    padding: 5px 12px;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: 0.01em;
    animation: chipAppear 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    opacity: 0;
  }
  @keyframes chipAppear {
    from { opacity: 0; transform: scale(0.6) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* === Option Glyph (Q1 단계 표시) === */
  .diag-option-glyph {
    font-size: 22px;
    line-height: 1;
    color: var(--brand);
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    transition: color 0.25s ease;
    user-select: none;
  }
  .diag-option.selected .diag-option-glyph { color: rgba(255,255,255,0.95); }
  .diag-option-content { flex: 1; min-width: 0; }
  .diag-option.has-glyph {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* === Result Transition (응답 칩 → 메인 처방 합쳐지는 모션) === */
  .transition-wrap {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 20px;
  }
  .transition-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 600px;
    animation: chipsConverge 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .transition-chips .answer-chip {
    font-size: 13px;
    padding: 6px 14px;
    animation: chipFloat 1.2s ease-in-out infinite alternate;
    opacity: 1;
  }
  .transition-chips .answer-chip:nth-child(2n) { animation-delay: 0.2s; }
  .transition-chips .answer-chip:nth-child(3n) { animation-delay: 0.4s; }
  @keyframes chipFloat {
    from { transform: translateY(0); }
    to { transform: translateY(-3px); }
  }
  @keyframes chipsConverge {
    0% { transform: scale(1); opacity: 1; }
    70% { transform: scale(0.7); opacity: 0.5; }
    100% { transform: scale(0.4); opacity: 0; }
  }
  .transition-text {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--brand);
    letter-spacing: -0.015em;
    animation: textPulse 1.4s ease-in-out infinite;
  }
  .transition-sub {
    font-size: 13px;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
  }
  @keyframes textPulse {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }

  /* === Hero === */
  .hero { margin-bottom: 48px; }
  .hero-eyebrow {
    font-size: 12px; letter-spacing: 0.18em; /* text-transform removed */
    color: var(--warn); font-weight: 600; margin-bottom: 16px;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: 48px; font-weight: 500; line-height: 1.15;
    letter-spacing: -0.02em; color: var(--ink); margin-bottom: 20px;
  }
  .hero-lead {
    font-size: 19px; line-height: 1.6; color: var(--ink-soft);
    max-width: 620px; font-weight: 400;
  }

  /* === Two paths === */
  .paths {
    display: grid; grid-template-columns: 1.4fr 1fr;
    gap: 16px; margin: 56px 0;
  }
  .path-card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 36px 32px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .path-card:hover {
    border-color: var(--brand);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(15, 26, 46, 0.06);
  }
  .path-card.primary {
    background: var(--brand);
    color: white;
    border-color: var(--brand);
  }
  .path-card.primary:hover { background: var(--brand-deep); }
  .path-tag {
    display: inline-block;
    font-size: 11px; letter-spacing: 0.14em; /* text-transform removed */
    padding: 4px 10px; border-radius: 100px;
    background: var(--bg-accent); color: var(--warn);
    margin-bottom: 20px; font-weight: 600;
  }
  .path-card.primary .path-tag { background: rgba(255,255,255,0.15); color: white; }
  .path-card h3 {
    font-family: var(--serif);
    font-size: 28px; font-weight: 500; line-height: 1.2;
    margin-bottom: 12px; letter-spacing: -0.015em;
  }
  .path-card p { font-size: 15px; line-height: 1.6; opacity: 0.85; margin-bottom: 24px; }
  .path-arrow {
    font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .path-arrow::after { content: '→'; transition: transform 0.2s; }
  .path-card:hover .path-arrow::after { transform: translateX(4px); }

  /* === Menu Preview === */
  .menu-preview { margin-top: 64px; }
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 28px;
  }
  .section-header h2 {
    font-family: var(--serif);
    font-size: 32px; font-weight: 500; letter-spacing: -0.02em;
  }
  .section-header h2 em { font-style: italic; color: var(--brand); }
  .section-header .meta { font-size: 13px; color: var(--ink-mute); letter-spacing: 0.04em; }

  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  @media (min-width: 768px) {
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }
  }
  .menu-cat {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    padding: 18px 20px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    color: inherit;
    text-decoration: none;
    transition: all 0.15s ease;
    position: relative;
    width: 100%;
    min-width: 0;
    max-width: 100%;
    writing-mode: horizontal-tb;
    white-space: normal;
    word-break: keep-all;
    overflow-wrap: break-word;
    box-sizing: border-box;
  }
  @media (min-width: 768px) {
    .menu-cat {
      padding: 20px 22px;
      border-radius: 3px;
      height: 100%;
    }
  }
  .menu-cat:hover { border-color: var(--brand); transform: translateY(-1px); }
  .menu-cat .ext-arrow {
    position: absolute; top: 16px; right: 18px;
    font-size: 13px; color: var(--ink-mute);
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .menu-cat:hover .ext-arrow { color: var(--brand); transform: translate(2px, -2px); }
  .menu-cat-label {
    font-size: 11px; letter-spacing: 0.12em;
    color: var(--ink-mute); font-weight: 600; margin-bottom: 6px;
    padding-right: 24px;
    white-space: normal;
    writing-mode: horizontal-tb;
  }
  .menu-cat h4 {
    font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--ink);
    padding-right: 24px;
    line-height: 1.35;
    white-space: normal;
    writing-mode: horizontal-tb;
    word-break: keep-all;
  }
  @media (min-width: 768px) {
    .menu-cat h4 {
      font-size: 17px;
      margin-bottom: 10px;
      min-height: 2.4em;
    }
  }
  .menu-cat-items {
    font-size: 13px; color: var(--ink-soft); line-height: 1.65;
    white-space: normal;
    writing-mode: horizontal-tb;
    word-break: keep-all;
  }
  .menu-cat-items span { color: var(--ink-mute); }

  /* === Diagnosis === */
  .diag-wrap { max-width: 720px; margin: 0 auto; }
  .diag-eyebrow {
    font-size: 12px; letter-spacing: 0.16em; /* text-transform removed */
    color: var(--warn); font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .diag-eyebrow .count { color: var(--ink-mute); font-weight: 500; letter-spacing: 0.08em; }
  .diag-question {
    font-family: var(--serif);
    font-size: 38px; font-weight: 500; line-height: 1.2;
    letter-spacing: -0.02em; margin-bottom: 12px;
  }
  .diag-sub {
    font-size: 14px; color: var(--ink-mute); margin-bottom: 36px;
  }
  .diag-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
  .diag-option {
    background: var(--bg-elevated);
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 18px 22px;
    cursor: pointer;
    transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                color 0.25s ease,
                border-color 0.3s ease,
                transform 0.2s ease,
                box-shadow 0.3s ease;
    text-align: left;
    font-family: inherit;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .diag-option:hover {
    border-color: var(--brand-light);
    background: var(--brand-soft);
    transform: translateY(-1px);
  }
  .diag-option.selected {
    border-color: var(--brand);
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(80, 70, 229, 0.22);
  }
  .diag-option-label {
    font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4;
    transition: color 0.25s ease;
  }
  .diag-option-desc {
    font-size: 13px; color: var(--ink-soft); line-height: 1.5;
    transition: color 0.25s ease;
  }
  .diag-option.selected .diag-option-desc { color: rgba(255,255,255,0.88); }

  .diag-nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .btn-text {
    background: none; border: none; color: var(--ink-mute);
    font-family: inherit; font-size: 14px; cursor: pointer;
    padding: 8px 0; font-weight: 500;
  }
  .btn-text:hover { color: var(--brand); }
  .btn {
    background: var(--brand); color: white; border: none;
    padding: 12px 28px; border-radius: 3px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    transition: background 0.15s ease;
  }
  .btn:hover { background: var(--brand-deep); }
  .btn:disabled { background: var(--line); color: var(--ink-mute); cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--brand); border: 1.5px solid var(--brand);
  }
  .btn-ghost:hover { background: var(--brand-soft); }

  /* === Result === */
  .result-wrap { max-width: 920px; margin: 0 auto; }
  .result-header {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    padding: 32px 36px;
    border-radius: 4px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 32px;
    align-items: center;
  }
  .result-header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--brand), var(--accent));
  }
  .result-header-left { min-width: 0; }
  .result-header-right {
    padding-left: 32px;
    border-left: 1px solid var(--line-soft);
  }
  .result-eyebrow {
    font-size: 12px; letter-spacing: 0.16em;
    color: var(--accent); font-weight: 700; margin-bottom: 12px;
  }
  .result-title {
    font-family: var(--serif);
    font-size: 28px; font-weight: 500; line-height: 1.25;
    letter-spacing: -0.015em; margin-bottom: 16px;
  }
  .result-badges {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .badge {
    font-size: 12px; padding: 5px 12px; border-radius: 100px;
    background: var(--bg-soft); color: var(--ink-soft);
    font-weight: 500; letter-spacing: 0.02em;
  }
  .result-narrative {
    font-size: 14.5px; line-height: 1.65; color: var(--ink-soft);
  }
  .result-narrative strong { color: var(--ink); font-weight: 600; }

  /* === Prescription tiers === */
  .tier { margin-bottom: 40px; }
  .tier-head {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1px solid var(--line-soft);
  }
  .tier-num {
    font-size: 18px; letter-spacing: 2px;
    color: var(--warn); line-height: 1;
  }
  .tier-title {
    font-size: 16px; font-weight: 700; letter-spacing: -0.005em;
  }
  .tier-meta { font-size: 12px; color: var(--ink-mute); margin-left: auto; }

  .main-card {
    background: var(--brand);
    color: white;
    padding: 32px 36px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .main-card::after {
    content: '';
    position: absolute; top: -50%; right: -10%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .main-tag {
    display: inline-block; font-size: 11px; letter-spacing: 0.14em;
    /* text-transform removed */ padding: 4px 10px; border-radius: 100px;
    background: rgba(255,255,255,0.15); margin-bottom: 16px; font-weight: 600;
  }
  .main-name {
    font-family: var(--serif);
    font-size: 32px; font-weight: 500; line-height: 1.2;
    letter-spacing: -0.02em; margin-bottom: 12px;
  }
  .main-reason {
    font-size: 14px; line-height: 1.65; opacity: 0.88;
    margin-bottom: 24px; max-width: 580px;
  }
  .main-ctas { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-light {
    background: white; color: var(--brand); border: none;
    padding: 12px 24px; border-radius: 3px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    display: inline-block; text-decoration: none; text-align: center;
  }
  .btn-light:hover { background: var(--bg-soft); }
  .btn-outline-light {
    background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.4);
    padding: 12px 24px; border-radius: 3px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    display: inline-block; text-decoration: none; text-align: center;
  }
  .btn-outline-light:hover { border-color: white; background: rgba(255,255,255,0.08); color: white; }

  .item-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .item-card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
    transition: all 0.15s ease;
    display: block;
    color: inherit;
    text-decoration: none;
    position: relative;
  }
  .item-card:hover { border-color: var(--brand); transform: translateY(-1px); }
  .item-card .ext-arrow {
    position: absolute; top: 14px; right: 14px;
    font-size: 13px; color: var(--ink-mute);
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .item-card:hover .ext-arrow { color: var(--brand); transform: translate(2px, -2px); }
  .item-type {
    font-size: 10px; letter-spacing: 0.12em; /* text-transform removed */
    color: var(--ink-mute); font-weight: 600; margin-bottom: 6px;
  }
  .item-type.free { color: var(--accent); }
  .item-type.paid { color: var(--warn); }
  .item-title {
    font-size: 15px; font-weight: 600; line-height: 1.4;
    margin-bottom: 8px;
  }
  .item-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; }
  .item-meta {
    display: flex; gap: 8px; margin-top: 12px;
    font-size: 11px; color: var(--ink-mute);
  }
  .item-meta span::after { content: '·'; margin-left: 8px; color: var(--line); }
  .item-meta span:last-child::after { display: none; }

  /* === Personalization layers on item-card === */
  .item-card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-right: 22px;
  }
  .item-rank {
    font-size: 10px; letter-spacing: 0.06em;
    background: var(--bg-soft); color: var(--ink-soft);
    padding: 3px 8px; border-radius: 100px;
    font-weight: 600;
  }
  .item-rank.top {
    background: var(--brand-soft); color: var(--brand);
  }
  .item-when {
    font-size: 10px; color: var(--warn); font-weight: 700;
    letter-spacing: 0.04em;
  }
  .item-context {
    font-size: 12px; line-height: 1.55;
    color: var(--ink-soft);
    background: var(--bg-soft);
    border-left: 2px solid var(--brand);
    padding: 8px 10px;
    border-radius: 2px;
    margin: 10px 0 12px;
  }
  .item-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin: 10px 0 8px;
  }
  .item-stat {
    background: var(--bg-soft);
    padding: 7px 9px;
    border-radius: 4px;
  }
  .item-stat-label {
    font-size: 9.5px; color: var(--ink-mute);
    letter-spacing: 0.04em; margin-bottom: 2px;
    text-transform: uppercase; font-weight: 600;
  }
  .item-stat-value {
    font-size: 12px; font-weight: 700; color: var(--ink);
    line-height: 1.3;
  }
  .item-social {
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.5;
    margin-top: 12px; padding-top: 10px;
    border-top: 1px dashed var(--line-soft);
  }
  .item-social .dot { color: var(--accent); margin-right: 5px; font-weight: 700; }

  /* Skip-note box (시점에서 빠른 콘텐츠 안내) */
  .skip-note-box {
    background: var(--bg-soft);
    border: 1px dashed var(--line);
    border-radius: 3px;
    padding: 12px 16px;
    margin-top: 14px;
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.6;
  }
  .skip-note-box strong { color: var(--ink); font-weight: 600; }

  .alt-card {
    background: var(--bg-soft);
    border: 1px dashed var(--line);
    border-radius: 3px;
    padding: 18px 22px;
    font-size: 14px; color: var(--ink-soft); line-height: 1.6;
  }
  .alt-card strong { color: var(--ink); font-weight: 600; }
  .alt-card a { color: var(--brand); font-weight: 600; text-decoration: none; cursor: pointer; }
  .alt-card a:hover { text-decoration: underline; }

  /* === Filters === */
  .filter-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 16px 0; margin-top: 24px; flex-wrap: wrap;
    border-top: 1px solid var(--line-soft);
  }
  .filter-label {
    font-size: 12px; color: var(--ink-mute); letter-spacing: 0.06em;
    /* text-transform removed */ font-weight: 600; margin-right: 4px;
  }
  .chip {
    background: transparent; border: 1px solid var(--line);
    padding: 6px 14px; border-radius: 100px;
    font-family: inherit; font-size: 13px;
    cursor: pointer; color: var(--ink-soft);
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--brand); color: var(--brand); }
  .chip.active {
    background: var(--ink); color: white; border-color: var(--ink);
  }

  /* === Precise form === */
  .precise-wrap { max-width: 640px; margin: 0 auto; }
  .precise-eyebrow {
    font-size: 12px; letter-spacing: 0.16em; /* text-transform removed */
    color: var(--warn); font-weight: 600; margin-bottom: 14px;
  }
  .precise-title {
    font-family: var(--serif);
    font-size: 38px; font-weight: 500; line-height: 1.2;
    letter-spacing: -0.02em; margin-bottom: 14px;
  }
  .precise-sub {
    font-size: 16px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 40px;
  }
  .form-group { margin-bottom: 24px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--ink); margin-bottom: 8px; letter-spacing: 0.02em;
  }
  .form-label .optional { color: var(--ink-mute); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .form-input, .form-select {
    width: 100%; padding: 12px 16px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--line);
    border-radius: 3px;
    font-family: inherit; font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s ease;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--brand); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-submit { width: 100%; padding: 15px; font-size: 15px; margin-top: 12px; }
  .success-msg {
    background: var(--bg-mint); border: 1px solid var(--accent);
    padding: 28px 32px; border-radius: 4px; margin-top: 24px;
  }
  .success-msg h3 { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 10px; color: var(--accent); }
  .success-msg p { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
  .success-msg ul { margin-top: 14px; padding-left: 20px; font-size: 13px; color: var(--ink-soft); }
  .success-msg ul li { margin-bottom: 4px; }

  /* === Footer === */
  .footer {
    margin-top: 80px; padding-top: 32px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; color: var(--ink-mute);
  }
  .footer-meta { letter-spacing: 0.04em; }

  /* === Animations === */
  .fade-in {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .fade-in:nth-child(2) { animation-delay: 0.06s; }
  .fade-in:nth-child(3) { animation-delay: 0.12s; }
  .fade-in:nth-child(4) { animation-delay: 0.18s; }
  .fade-in:nth-child(5) { animation-delay: 0.24s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Responsive === */
  @media (max-width: 720px) {
    .container { padding: 20px 16px 60px; }
    .topnav {
      flex-wrap: wrap;
      gap: 8px 12px;
      padding-bottom: 18px;
      margin-bottom: 32px;
    }
    .logo img { height: 22px; }
    .logo-sub { font-size: 12px; padding-left: 8px; }
    .nav-meta { font-size: 10.5px; flex-basis: 100%; text-align: left; margin-top: 4px; }
    .hero { margin-bottom: 32px; }
    .hero-eyebrow { font-size: 11px; margin-bottom: 12px; }
    .hero h1 { font-size: 30px; line-height: 1.25; letter-spacing: -0.015em; }
    .hero-lead { font-size: 14.5px; line-height: 1.6; }
    .paths { grid-template-columns: 1fr; gap: 12px; }
    .path-card { padding: 24px 22px; }
    .path-card h3 { font-size: 22px; }
    .path-card p { font-size: 14px; }
    .section-header h2 { font-size: 24px; }
    .form-row { grid-template-columns: 1fr; }
    .step-track { gap: 4px; margin-bottom: 18px; }
    .step-label { font-size: 9.5px; letter-spacing: 0; }
    .diag-question { font-size: 24px; line-height: 1.25; }
    .diag-sub { font-size: 14px; }
    .diag-option { padding: 16px 18px; }
    .diag-option-label { font-size: 15px; }
    .diag-option-desc { font-size: 12.5px; }
    .answer-chip { font-size: 11px; padding: 4px 10px; }
    .result-header {
      padding: 24px 20px;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .result-header-right {
      padding-left: 0;
      padding-top: 16px;
      border-left: none;
      border-top: 1px solid var(--line-soft);
    }
    .main-card { padding: 22px 20px; }
    .main-name { font-size: 22px; }
    .main-reason { font-size: 13.5px; }
    .result-title { font-size: 22px; }
    .precise-title { font-size: 26px; }
    .transition-text { font-size: 18px; }
  }
  @media (max-width: 480px) {
    .container { padding: 16px 14px 56px; }
    .topnav { padding-bottom: 14px; margin-bottom: 24px; }
    .logo img { height: 20px; }
    .logo-sub { font-size: 11px; padding-left: 6px; }
    .nav-meta { font-size: 10px; }
    .hero h1 { font-size: 26px; line-height: 1.3; }
    .hero-lead { font-size: 13.5px; }
    .path-card h3 { font-size: 20px; }
    .path-card p { font-size: 13.5px; }
    .menu-cat h4 { font-size: 15px; }
    .diag-question { font-size: 21px; }
    .main-name { font-size: 20px; }
    .step-label { font-size: 8.5px; }
  }
  @media print {
    @page { size: A4; margin: 1cm; }
    body {
      background: white !important;
      background-image: none !important;
    }
    .topnav, .footer, #result-bottom-actions { display: none !important; }
    .container { padding: 0; max-width: 100%; }
    .fade-in { animation: none !important; opacity: 1 !important; transform: none !important; }
    .main-card, .tier, .result-header, .item-card {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }
</style>

function buildAnswerChips(uptoIdx) {
  // uptoIdx 미만의 질문 응답만 (현재 진행 중인 질문은 제외)
  const chips = [];
  for (let i = 0; i < uptoIdx; i++) {
    const q = QUESTIONS[i];
    if (!q) continue;
    const ans = state.answers[q.id];
    if (!ans) continue;
    if (Array.isArray(ans)) {
      ans.forEach(v => {
        if (v === 'skip') return;
        const label = CHIP_LABELS[q.id]?.[v];
        if (label) chips.push(label);
      });
    } else {
      if (ans === 'skip') continue;
      const label = CHIP_LABELS[q.id]?.[ans];
      if (label) chips.push(label);
    }
  }
  return chips;
}

// ============================================================
//  MATCHING ENGINE
// ============================================================
//  복수선택 호환 헬퍼 (q4, q5는 배열일 수 있음)
// ============================================================
function inAns(ans, v) {
  if (Array.isArray(ans)) return ans.includes(v);
  return ans === v;
}
function firstAns(ans) {
  if (Array.isArray(ans)) return ans.length > 0 ? ans[0] : null;
  return ans || null;
}
function hasAnyAns(ans) {
  if (Array.isArray(ans)) return ans.length > 0;
  return !!ans && ans !== 'skip';
}

// ============================================================
//  응답값 자동 매핑 헬퍼
//  새 응답(q2 도구 수준 + q3 문화) → 기존 처방 로직의 단계(before/early/using/deep) 유추
// ============================================================
function inferStage(a) {
  const dx = a.q2;      // paper | chat | groupware | collab | ai
  const culture = a.q3; // structured | hybrid | on_demand | chat_only

  // AI 단계는 무조건 심화 (AX 확장)
  if (dx === 'ai') return 'deep';

  // 도구가 종이·엑셀 / 카톡·메일 = 도입 전
  if (dx === 'paper' || dx === 'chat') return 'before';

  // 그룹웨어
  if (dx === 'groupware') {
    if (culture === 'chat_only' || culture === 'on_demand') return 'before';  // 아직 협업 도구 검토 필요
    return 'early';  // hybrid / structured → 도입 직후에 가까운 상태
  }

  // 협업 도구 사용 중
  if (dx === 'collab') {
    if (culture === 'chat_only' || culture === 'on_demand') return 'early';   // 도입은 했으나 정착 실패 리스크
    if (culture === 'hybrid') return 'using';                                 // 혼합 → 활용 심화 필요
    if (culture === 'structured') return 'deep';                              // 툴 중심 → 심화 정착
  }

  return 'using';  // 기본값
}

// AX 니즈 여부 - AI 자동화 단계이거나 Q7에서 'ax' 명시적 선택
function isAxNeed(a) {
  if (a.q2 === 'ai') return true;
  if (inAns(a.flow_wish, 'ax')) return true;
  return false;
}

// 심화 니즈 여부 - Q7에서 automate/process 응답 (레벨업 원함)
function isAdvancedNeed(a) {
  return inAns(a.flow_wish, 'automate') || inAns(a.flow_wish, 'process');
}

// 기본 니즈 여부 - Q7에서 archive/assign/chat 응답 (DX 기본)
function isBasicNeed(a) {
  return inAns(a.flow_wish, 'archive') || inAns(a.flow_wish, 'assign') || inAns(a.flow_wish, 'chat');
}

function getCompanions(a) {
  // q5는 배열일 수 있음. 빈 배열/skip이면 'all' 매칭만
  const roles = Array.isArray(a.q5) ? a.q5.filter(r => r && r !== 'skip') : (a.q5 && a.q5 !== 'skip' ? [a.q5] : []);
  const stage = inferStage(a);  // 새 응답 기반 단계 유추

  // 함께 활용: 영상 2 + 템플릿 1
  const roleMatches = (itemRole) => roles.length === 0 ? itemRole === 'all' : (roles.includes(itemRole) || itemRole === 'all');

  const vids = VIDEOS.filter(v =>
    roleMatches(v.role) &&
    (v.stage === stage || (stage === 'early' && v.stage === 'early') || (stage === 'using' && v.stage === 'using'))
  ).slice(0, 2);

  if (vids.length < 2) {
    VIDEOS.filter(v => v.stage === stage && !vids.find(x => x.id === v.id)).forEach(v => {
      if (vids.length < 2) vids.push(v);
    });
  }

  const tpls = TEMPLATES.filter(t => roleMatches(t.role)).slice(0, 1);
  if (tpls.length < 1) tpls.push(TEMPLATES[0]);
  return [...vids, ...tpls];
}

// ===== 진단 응답 기반 매뉴얼 자동 매칭 =====
function getRelevantManual(a) {
  const q4Arr = Array.isArray(a.q4) ? a.q4 : (a.q4 ? [a.q4] : []);
  const q5Arr = Array.isArray(a.q5) ? a.q5.filter(r => r && r !== 'skip') : [];
  const stage = inferStage(a);

  // pain은 이제 배열(복수선택)
  const painArr2 = Array.isArray(a.pain) ? a.pain : (a.pain ? [a.pain] : []);

  // 0순위 — 반복 업무 응답 기반 매뉴얼 매칭
  if (painArr2.includes('unknown') || painArr2.length === 0) {
    return { title: '매뉴얼: 플로우 팀에게 도움 받는 5가지 방법', url: LINKS.manual_help_5ways, meta: ['5분 읽기', '무료'] };
  }
  if (painArr2.includes('onboarding')) {
    return { title: '매뉴얼: 회사 전체 관리자(어드민) 권한', url: LINKS.manual_admin_role, meta: ['8분 읽기', '무료'] };
  }
  if (painArr2.includes('tracking')) {
    return { title: '매뉴얼: 필요한 알림만 받는 법', url: LINKS.manual_notification, meta: ['5분 읽기', '무료'] };
  }
  // 'reports' / 'meetings' / 'search' 는 시트에 정확한 매뉴얼이 추가되면 분기 확장 예정

  // 1순위 — AI 자동화까지 사용 중 (AX 확장)
  if (isAxNeed(a)) {
    return { title: '매뉴얼: 플로우 AI 전체 가이드', url: LINKS.manual_ai, meta: ['10분 읽기', '무료'] };
  }
  // 2순위 — 도입 검토 단계
  if (stage === 'before') {
    return { title: '매뉴얼: 요금제 안내 (게스트 vs 비즈니스)', url: LINKS.manual_pricing, meta: ['5분 읽기', '무료'] };
  }
  // 3순위 — 도입 직후 (구성원 세팅 필요)
  if (stage === 'early') {
    return { title: '매뉴얼: 구성원 일괄 등록', url: LINKS.manual_bulk_user, meta: ['7분 읽기', '무료'] };
  }
  // 4순위 — 슈퍼100 관심 또는 관리자 직종
  if (q4Arr.includes('super100') || q5Arr.includes('lead')) {
    return { title: '매뉴얼: 회사 전체 관리자(어드민) 권한', url: LINKS.manual_admin_role, meta: ['8분 읽기', '무료'] };
  }
  // 5순위 — 심화 정착 단계
  if (stage === 'deep') {
    return { title: '매뉴얼: 플로우팀 맞춤 정착 솔루션', url: LINKS.manual_settlement_solution, meta: ['8분 읽기', '무료'] };
  }
  // 6순위 — 개발 직종
  if (q5Arr.includes('dev')) {
    return { title: '매뉴얼: 구글드라이브 연동', url: LINKS.manual_gdrive_integration, meta: ['5분 읽기', '무료'] };
  }
  // 7순위 — 활용 단계 (혼합 문화)
  if (stage === 'using') {
    return { title: '매뉴얼: 프로젝트 관리자에 대해 알아보기', url: LINKS.manual_pm_role, meta: ['6분 읽기', '무료'] };
  }
  // 기본값 — 도움받는 5가지 방법
  return { title: '매뉴얼: 플로우 팀에게 도움 받는 5가지 방법', url: LINKS.manual_help_5ways, meta: ['5분 읽기', '무료'] };
}

  const dx = { paper: '종이·엑셀', chat: '카톡·메일', groupware: '그룹웨어', collab: '협업 도구', ai: 'AI 자동화' }[a.q2];
  const culture = { structured: '툴 중심', hybrid: '혼합', on_demand: '요청 기반', chat_only: '채팅·구두' }[a.q3];
  // pain은 복수선택 - 첫번째 반복 업무만 뱃지로 표시
  const painMap = { reports: '보고서 반복', meetings: '회의록 반복', search: '자료 검색 반복', onboarding: '온보딩 반복', tracking: '진행 추적 수작업', unknown: '반복 업무 진단 필요' };
  const painFirst = firstAns(a.pain);
  const pain = painFirst ? painMap[painFirst] : null;
  const workHours = { lt5: '주 5h 미만', '5to10': '주 5~10h', '10to20': '주 10~20h', gt20: '주 20h+', unknown: '측정 필요' }[a.work_hours];
  // flow_wish도 복수선택 - 첫번째만 뱃지로 표시
  const wishMap = { archive: '자료 아카이빙 희망', assign: '담당·마감 공유 희망', chat: '실시간 소통 희망', automate: '업무 자동화 희망', process: '프로세스 확립 희망', ax: 'AX 전환 희망' };
  const wishFirst = firstAns(a.flow_wish);
  const wish = wishFirst ? wishMap[wishFirst] : null;
  // q4는 복수선택 - 첫번째 선호도만 뱃지로 표시
  const prefMap = { intro: '소개 선호', basic: '기본 교육 선호', super100: '슈퍼100 관심' };
  const q4First = firstAns(a.q4);
  const pref = q4First ? prefMap[q4First] : null;
  // q5도 복수선택 - 직종(들) 모두 표시
  const roleMap = { sales:'영업', mkt:'마케팅', hr:'HR', dev:'개발', design:'디자인', pm:'PM', cs:'CS', lead:'관리자' };
  const roles = Array.isArray(a.q5) ? a.q5.filter(r => r && r !== 'skip').map(r => roleMap[r]).filter(Boolean) : (a.q5 && a.q5 !== 'skip' && roleMap[a.q5] ? [roleMap[a.q5]] : []);
  return [industry, dx, culture, pain, workHours, wish, pref, ...roles].filter(Boolean);

function renderDiagnosis() {
  const total = QUESTIONS.length;
  const q = QUESTIONS[state.qIdx];
  const selected = state.answers[q.id];
  const isMulti = !!q.multi;
  // 단일선택: selected는 문자열. 복수선택: selected는 배열
  const selectedArr = isMulti ? (Array.isArray(selected) ? selected : []) : [];

  // 단계 트랙 (라벨 포함)
  const steps = QUESTIONS.map((qq, i) => {
    const cls = i < state.qIdx ? 'done' : (i === state.qIdx ? 'active' : '');
    return `
      <div class="step-item ${cls}">
        <div class="step-bar"></div>
        <div class="step-label">${qq.stepLabel || qq.label}</div>
      </div>
    `;
  }).join('');

  // 응답 누적 칩 (현재 질문 이전까지의 답변만)
  const chips = buildAnswerChips(state.qIdx);
  const chipsHtml = chips.length > 0 ? `
    <div class="context-area fade-in">
      <div class="context-label">지금까지의 답변</div>
      <div class="answer-chips">
        ${chips.map(c => `<span class="answer-chip">${c}</span>`).join('')}
      </div>
    </div>
  ` : '';

  // 옵션 (Q1만 글리프 표시)
  const glyphMap = GLYPHS[q.id] || {};
  const hasGlyph = Object.keys(glyphMap).length > 0;
  const opts = q.options.map(opt => {
    const isSelected = isMulti ? selectedArr.includes(opt.v) : selected === opt.v;
    const glyph = glyphMap[opt.v] || '';
    return `
      <button class="diag-option ${isSelected ? 'selected' : ''} ${hasGlyph ? 'has-glyph' : ''}"
              data-value="${opt.v}"
              onclick="selectOption('${q.id}', '${opt.v}')">
        ${glyph ? `<span class="diag-option-glyph">${glyph}</span>` : ''}
        <div class="diag-option-content">
          <div class="diag-option-label">${opt.label}</div>
          ${opt.desc ? `<div class="diag-option-desc">${opt.desc}</div>` : ''}
        </div>
      </button>
    `;
  }).join('');

  const isLast = state.qIdx === total - 1;
  const hasAnswer = isMulti ? selectedArr.length > 0 : selected !== undefined;
  const canNext = q.optional || hasAnswer;
  const nextLabel = isLast ? '처방전 받기 →' : '다음 →';

  // 단일선택은 클릭 시 자동 이동. 복수선택·마지막 질문은 명시적 버튼 필요.
  const needsNextButton = isMulti || isLast;

  $app.innerHTML = `
    <div class="diag-wrap">
      <div class="step-track">${steps}</div>
      ${chipsHtml}
      <div class="diag-eyebrow fade-in">
        <span>Q${state.qIdx + 1} · ${q.label}</span>
        <span class="count">${state.qIdx + 1} / ${total}</span>
      </div>
      <h2 class="diag-question fade-in">${q.text}</h2>
      <p class="diag-sub fade-in">${q.sub}</p>
      <div class="diag-options fade-in">${opts}</div>
      <div class="diag-nav fade-in">
        <button class="btn-text" onclick="goBack()">${state.qIdx === 0 ? '← 홈으로' : '← 이전'}</button>
        <div style="display: flex; gap: 12px; align-items: center;">
          ${q.optional ? '<button class="btn-text" onclick="skipOptional()">건너뛰기</button>' : ''}
          ${needsNextButton ? `<button class="btn" id="js-next-btn" ${canNext ? '' : 'disabled'} onclick="goNext()">${nextLabel}</button>` : ''}
        </div>
      </div>
    </div>
  `;
}

          <div class="item-stat-value">${impact.effect}</div>
        </div>
      </div>
    ` : '';

    const socialHtml = social ? `
      <div class="item-social"><span class="dot">●</span>${social}</div>
    ` : '';

    if (isVideo) {
      return `
        <a class="item-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <span class="ext-arrow">↗</span>
          ${headerHtml}
          <div class="item-type free">영상 · 무료</div>
          <div class="item-title">${item.title}</div>
          <div class="item-context">${context}</div>
          ${statsHtml}
          <div class="item-meta"><span>${item.dur}</span><span>유튜브</span></div>
          ${socialHtml}
        </a>
      `;
    } else {
      return `
        <a class="item-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <span class="ext-arrow">↗</span>
          ${headerHtml}
          <div class="item-type free">템플릿 · 무료</div>
          <div class="item-title">${item.title}</div>
          <div class="item-context">${context}</div>
          ${statsHtml}
          <div class="item-meta"><span>${item.scenario}</span><span>${item.diff} 사용</span></div>
          ${socialHtml}
        </a>
      `;
    }
  }).join('');

  const skipNote = getSkipNote(a);
  const skipNoteHtml = skipNote ? `
    <div class="skip-note-box">
      <strong>${skipNote.title}</strong> · ${skipNote.body}
    </div>
  ` : '';

  const quickCards = quick.map(item => `
    <a class="item-card" href="${item.url || PLACEHOLDER}" target="_blank" rel="noopener noreferrer">
      <span class="ext-arrow">↗</span>
      <div class="item-type free">${item.kind === 'video' ? '영상' : item.kind === 'chat' ? '상담' : '매뉴얼'} · 무료</div>
      <div class="item-title">${item.title}</div>
      <div class="item-meta">${item.meta.map(m => `<span>${m}</span>`).join('')}</div>
    </a>
  `).join('');

  $app.innerHTML = `
    <div class="result-wrap">
      <div class="result-header fade-in">
        <div class="result-header-left">
          <div class="result-eyebrow">진단 결과</div>
          <h2 class="result-title">우리 조직에 딱 맞는<br>협업 처방전이에요.</h2>
          <div class="result-badges">${bs.map(b => `<span class="badge">${b}</span>`).join('')}</div>
        </div>
        <div class="result-header-right">
          <p class="result-narrative">${narrative}</p>
        </div>
      </div>

      <!-- Tier 1: Main -->
      <div class="tier fade-in">
        <div class="tier-head">
          <div class="tier-num">★★★</div>
          <div class="tier-title">지금 가장 필요한 것</div>
          <div class="tier-meta">메인 처방 · 1개</div>
        </div>
        <div class="main-card">
          <span class="main-tag">${main.tag}</span>
          <h3 class="main-name">${main.name}</h3>
          <p class="main-reason">${main.reason}</p>
          <div class="main-ctas">
            <button class="btn-light" onclick="goPrecise()">${main.cta1}</button>
            <a class="btn-outline-light" href="${main.url2 || PLACEHOLDER}" target="_blank" rel="noopener noreferrer">${main.cta2} ↗</a>
          </div>
        </div>
      </div>

      <!-- Tier 2: Companions -->
      <div class="tier fade-in">
        <div class="tier-head">
          <div class="tier-num">★★</div>
          <div class="tier-title">함께 활용하면 좋은 것</div>
          <div class="tier-meta">메인을 더 잘 흡수하게 해줘요 · ${compFiltered.length}개</div>
        </div>
        <div class="item-grid">${compCards}</div>
        ${skipNoteHtml}
        <div class="filter-bar">
          <span class="filter-label">Filter</span>
          <button class="chip ${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">전체</button>
          <button class="chip ${state.filter === 'video' ? 'active' : ''}" onclick="setFilter('video')">영상만</button>
          <button class="chip ${state.filter === 'template' ? 'active' : ''}" onclick="setFilter('template')">템플릿만</button>
          <button class="chip ${state.filter === 'free' ? 'active' : ''}" onclick="setFilter('free')">무료만</button>
        </div>
      </div>

      <!-- Tier 3: Quick -->
      <div class="tier fade-in">
        <div class="tier-head">
          <div class="tier-num">★</div>
          <div class="tier-title">지금 바로 시도해볼 것</div>
          <div class="tier-meta">비용·시간 부담 없이 오늘 가능</div>
        </div>
        <div class="item-grid">${quickCards}</div>
      </div>

      <div id="result-bottom-actions" style="text-align: center; margin-top: 56px; padding-top: 40px; border-top: 1px solid var(--line-soft);">
        <p style="font-size: 14px; color: var(--ink-mute); margin-bottom: 20px;">이 추천이 우리 조직에 맞지 않다면, 다른 답변으로 다시 진단받아볼 수 있어요.</p>
        <div style="display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;">
          <button class="btn-ghost" onclick="downloadPDF()" style="padding: 16px 28px; font-size: 14px;">PDF로 저장</button>
          <button class="btn" onclick="restart()" style="padding: 16px 40px; font-size: 16px; letter-spacing: 0.02em;">다시 진단받기 ↻</button>
        </div>
      </div>
    </div>
  `;
}

function renderPrecise() {
  $app.innerHTML = `
    <div class="precise-wrap">
      <div class="precise-eyebrow fade-in">Step 2 · 정밀 진단</div>
      <h2 class="precise-title fade-in">조금만 더 알려주시면<br>처방이 정확해져요.</h2>
      <p class="precise-sub fade-in">
        진단 결과를 기반으로 우리 회사에 맞는 영상·템플릿·교육을 정밀하게 추천하고,
        담당자와의 15분 무료 미팅을 잡아드려요.
      </p>

      <form class="fade-in" id="preciseForm" onsubmit="submitPrecise(event)">
        <div class="form-group">
          <label class="form-label">회사명</label>
          <input class="form-input" name="company" placeholder="예: 마드라스체크" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">회사 규모</label>
            <select class="form-select" name="size" required>
              <option value="">선택</option>
              <option value="10">10인 이하</option>
              <option value="50">11~50인</option>
              <option value="100">51~100인</option>
              <option value="300">101~300인</option>
              <option value="big">300인 이상</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">직책</label>
            <select class="form-select" name="role" required>
              <option value="">선택</option>
              <option value="staff">실무자</option>
              <option value="lead">팀장 / 관리자</option>
              <option value="exec">임원 / 대표</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" name="email" type="email" placeholder="회사 이메일을 입력해주세요" required>
        </div>

          <label class="form-label">연락처 <span class="optional">(선택)</span></label>
          <input class="form-input" name="phone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label class="form-label">더 알려주실 내용 <span class="optional">(선택)</span></label>
          <input class="form-input" name="note" placeholder="예: 다음 분기 안에 도입 검토 중이에요">
        </div>
        <button class="btn form-submit" type="submit">정밀 진단 받기 →</button>
        <div style="text-align: center; margin-top: 16px;">
          <button type="button" class="btn-text" onclick="state.screen='result'; render();">← 결과로 돌아가기</button>
        </div>
      </form>

      <div id="successBox" style="display: none;"></div>
    </div>
  `;
}

// ============================================================
//  HANDLERS
// ============================================================
function startDiagnosis() {
  state.screen = 'diagnosis';
  state.qIdx = 0;
  state.answers = {};
  render();
}
function scrollToMenu() {
  document.getElementById('menu-section')?.scrollIntoView({ behavior: 'smooth' });
}
function selectOption(qid, v) {
  const q = QUESTIONS.find(qq => qq.id === qid);
  if (!q) return;

  if (q.multi) {
    // 복수선택: 배열에서 toggle
    const arr = Array.isArray(state.answers[qid]) ? [...state.answers[qid]] : [];
    const idx = arr.indexOf(v);
    if (idx >= 0) {
      arr.splice(idx, 1);  // 이미 선택돼 있으면 해제
    } else {
      if (q.maxSelect && arr.length >= q.maxSelect) {
        // 최대 선택 개수 도달 - 가장 오래된 항목 제거 후 추가
        arr.shift();
      }
      arr.push(v);
    }
    state.answers[qid] = arr;
    // 전체 render() 대신 DOM 부분 갱신으로 깜빡임 제거
    updateOptionStates(qid);
    updateNextButton(q);
  } else {
    // 단일선택: 값 저장 + 부드러운 selected 표시 후 자동 다음 페이지
    state.answers[qid] = v;
    updateOptionStates(qid);
    // 1초 딜레이: 선택한 답을 인지할 시간 확보
    setTimeout(() => goNext(), 1000);
  }
}

// 깜빡임 없는 옵션 상태 갱신 - DOM 직접 조작
function updateOptionStates(qid) {
  const ans = state.answers[qid];
  const buttons = document.querySelectorAll('.diag-option');
  buttons.forEach(btn => {
    const v = btn.dataset.value;
    let isSelected = false;
    if (Array.isArray(ans)) {
      isSelected = ans.includes(v);
    } else {
      isSelected = ans === v;
    }
    btn.classList.toggle('selected', isSelected);
  });
}

// 다음 버튼 활성화 상태 갱신
function updateNextButton(q) {
  const nextBtn = document.getElementById('js-next-btn');
  if (!nextBtn) return;
  const ans = state.answers[q.id];
  let hasAnswer = false;
  if (q.multi) {
    hasAnswer = Array.isArray(ans) && ans.length > 0;
  } else {
    hasAnswer = ans !== undefined && ans !== null;
  }
  const canNext = q.optional || hasAnswer;
  nextBtn.disabled = !canNext;
}
function goNext() {
  if (state.qIdx < QUESTIONS.length - 1) {
    state.qIdx += 1;
    render();
  } else {
    // 마지막 질문 → 응답 칩이 메인 처방으로 합쳐지는 트랜지션 → 결과지
    state.screen = 'transition';
    render();
    setTimeout(() => {
      state.screen = 'result';
      render();
    }, 1600);
  }
}
function goBack() {
  if (state.qIdx === 0) {
    state.screen = 'home';
    render();
  } else {
    state.qIdx -= 1;
    render();
  }
}
function skipOptional() {
  const q = QUESTIONS[state.qIdx];
  state.answers[q.id] = q.multi ? [] : 'skip';
  goNext();
}
function setFilter(f) {
  state.filter = f;
  render(true);  // 스크롤 위치 유지 - 같은 화면 내 필터 변경이므로
}
function goPrecise() {
  state.screen = 'precise';
  render();
}
function goHome() {
  state.screen = 'home';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function restart() {
  state.screen = 'home';
  state.qIdx = 0;
  state.answers = {};
  state.filter = 'all';
  render();
}
function downloadPDF() {
  window.print();
}
function submitPrecise(e) {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form));
  // 시뮬레이션 — 실제로는 HubSpot Forms API로 전송
  form.style.display = 'none';
  document.getElementById('successBox').style.display = 'block';
  document.getElementById('successBox').innerHTML = `
    <div class="success-msg">
      <h3>접수 완료 — 곧 연락드릴게요</h3>
      <p>
        <strong>${data.company}</strong>의 진단 결과와 함께 담당자가 1영업일 내로 연락드립니다.<br>
        이메일 <strong>${data.email}</strong>로 진단 리포트 사본도 함께 보내드릴게요.
      </p>
    </div>
    <div style="text-align: center; margin-top: 24px;">
      <button class="btn-text" onclick="restart()">처음으로 돌아가기 ↻</button>
    </div>
  `;
}

// 초기 렌더
render();
</script>
</body>
</html>
